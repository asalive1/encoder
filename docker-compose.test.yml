services:
  aac-encoder:
    image: ghcr.io/asalive1/encoder:test
    command: ["./build/encoder"]   # no --headless: enables web UI on webPort
    ports:
      - "8050:8080"                # host:container — access via http://server:8050
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./HLS:/app/HLS
    environment:
      - AAC_ENCODER_CONFIG=/app/config/config.json
    restart: unless-stopped
    networks:
      - encoder-net

networks:
  encoder-net:
    driver: bridge
