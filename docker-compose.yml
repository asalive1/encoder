services:
  aac-encoder:
    image: ghcr.io/asalive1/encoder:latest
    pull_policy: always   # always pull the latest image on every 'docker compose up'
    network_mode: host    # required for RTP multicast — bridge networking blocks IGMP/multicast
    # With host networking, ports are exposed directly on the host (no mapping needed):
    #   Web UI:      http://server:<webPort>    (config.json webPort)
    #   Metadata:    server:<listenPort>        (config.json listenPort)
    #   Control:     server:<controlPort>       (config.json controlPort)
    #   RTP audio:   multicast via rtpInterface in config.json
    volumes:
      - ./config:/app/build/config   # config.json, icecast_parse.json etc — read/write
      - ./logs:/app/logs             # log files — read/write
      - ./HLS:/app/HLS               # HLS segments — read/write
      - ./www:/app/www               # web assets — read/write
    environment:
      - AAC_ENCODER_CONFIG=/app/build/config/config.json
    restart: unless-stopped
