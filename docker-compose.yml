services:
  aac-encoder:
    image: ghcr.io/asalive1/encoder:latest
    # Authentication required for private registry:
    # Run: docker login ghcr.io
    # Use GitHub username and Personal Access Token (PAT) as password
    # Or set DOCKER_USERNAME and DOCKER_PASSWORD environment variables
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./HLS:/app/HLS
    environment:
      - AAC_ENCODER_CONFIG=/app/config/config.json
    restart: unless-stopped
    networks:
      - encoder-net

networks:
  encoder-net:
    driver: bridge
